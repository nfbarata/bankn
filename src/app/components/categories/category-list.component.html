<div class="row">
  <div class="col-6">
    <h2 i18n>Categories</h2>
  </div>
  <div class="col-6 text-end">
    <button class="btn btn-secondary" type="submit" [routerLink]="['/categories/category']">
      <span class="oi oi-plus"></span>
    </button>
  </div>
</div>
<br>
<div class="table-responsive">
  @if (categories.length>0) {
  <table class="table table-sm table-hover">
    <thead>
      <tr class="table-active">
        <th scope="col" class="align-middle" width="0%">Name</th>
        <th scope="col" class="text-right" width="0%">&nbsp;</th>
      </tr>
    </thead>
    <tbody>
      @for (category of categories; track category) {
      <tr>
        <td scope="row" class="align-middle">{{category | category}}&nbsp;</td>
        <td class="text-end">
          <button class="btn btn-primary" [routerLink]="['/categories/category',category.id]">
            <span class="oi oi-pencil"></span>
          </button>
        </td>
      </tr>
      }
    </tbody>
  </table>
  }
</div>
