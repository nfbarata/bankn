<div class="row">
  <div class="col-6">
    <h2 i18n>Entities</h2>
  </div>
  <div class="col-6 text-end">
    <button class="btn btn-secondary" type="submit" [routerLink]="['/entities/entity']">
      <span class="oi oi-plus"></span>
    </button>
  </div>
</div>
<br>
<div class="table-responsive">
  @if (entities.length>0) {
  <table class="table table-sm table-hover">
    <thead>
      <tr class="table-active">
        <th scope="col" class="align-middle" width="0%">Name</th>
        <th scope="col" class="align-middle">Category</th>
        <th scope="col" class="text-end" width="0%">&nbsp;</th>
      </tr>
    </thead>
    <tbody>
      @for (entity of entities; track entity) {
      <tr>
        <td scope="row" class="align-middle" [routerLink]="['/entities/entity',entity.id]">{{entity.name}}&nbsp;</td>
        <td class="align-middle" [routerLink]="['/entities/entity',entity.id]">{{ entity.referenceCategory | category
          }}&nbsp;</td>
        <td class="text-end">
          <button class="btn btn-primary" [routerLink]="['/entities/entity',entity.id]" title="Edit" i18n>
            <span class="oi oi-pencil"></span>
          </button>
        </td>
      </tr>
      }
    </tbody>
  </table>
  }
</div>
