<h2>{{form.value.id==null?'Create Account':'Edit Account'}}</h2>
<br>
<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="container">
    <div class="row mb-3">
      <div class="col-sm-6 mb-3">
        <label for="name" i18n>Name</label>
        <input class="form-control" id="name" type="text" formControlName="name">
      </div>
    </div>
    <div class="row">
      <div class="col-sm-12">
        <label i18n>Reference Value</label>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-sm-2 mb-3">
        <input title="referenceAmount" class="form-control" id="referenceAmount" type="text"
          formControlName="referenceAmount">
        <small id="referenceAmountHelpBlock" class="form-text text-muted">Value</small>
      </div>
      <div class="col-sm-4 mb-3">
        <select title="referenceCountry" class="form-select me-2" formControlName="referenceCountry">
          @for (country of countries; track country) {
          <option [selected]="country.alpha2==form.value.referenceCountry" [value]="country.alpha2"
            [disabled]="country.alpha2!=form.value.referenceCountry">
            {{country.name}} - {{country.currencies[0]}}
          </option>
          }
        </select>
        <small id="referenceCountryHelpBlock" class="form-text text-muted">Currency</small>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-sm-6 mb-3">
        <label for="dateInput" i18n>Reference Date</label>
        <input class="form-control" id="referenceDate" type="date" formControlName="referenceDate">
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-sm-6 col-12 mb-3">
        <label for="description" i18n>Description</label>
        <textarea class="form-control" id="description" formControlName="description"></textarea>
      </div>
    </div>
  </div>

  <div style="display:flex; gap:0.5rem;">
    <button class="btn btn-primary" type="submit" i18n>{{form.value.id==null?'Create':'Ok'}}</button>
    @if (form.value.id!=null) {
    <a class="btn btn-danger text-white" role="button" (click)="onDelete(form.value.id);" i18n>Delete</a>
    }
    <button type="button" class="btn btn-primary" (click)="onCancel();" i18n>Cancel</button>
  </div>
</form>
